name: Deploy to Develop

on:
  workflow_run:
    workflows: ["Build Develop Images"]
    types: [completed]
  workflow_dispatch:
    inputs:
      image_tag:
        description: Image tag to deploy. Defaults to develop.
        required: false
        type: string

env:
  IMAGE_PREFIX: ${{ vars.CONTAINER_REGISTRY || 'ghcr.io/sjwalentik/opencortex' }}
  DOMAIN: ${{ vars.DEVELOP_DOMAIN || 'opencortex.walentik.net' }}
  DEVELOP_DB_HOST: ${{ vars.DEVELOP_DB_HOST || 'opencortex-postgres.opencortex.svc.cluster.local' }}
  IMAGE_TAG: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || inputs.image_tag || 'develop' }}

jobs:
  deploy:
    if: github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'develop')
    runs-on: [self-hosted, linux, opencortex-deploy]
    environment: develop

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: latest

      - name: Create namespace
        run: |
          kubectl create namespace opencortex-develop --dry-run=client -o yaml | kubectl apply -f -

      - name: Create image pull secret
        run: |
          kubectl create secret docker-registry ghcr-pull-secret \
            --namespace=opencortex-develop \
            --docker-server=ghcr.io \
            --docker-username=${{ github.actor }} \
            --docker-password=${{ secrets.GHCR_PAT }} \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Create secrets from GitHub secrets
        run: |
          DB_CONNECTION_STRING="${{ secrets.DB_CONNECTION_STRING }}"
          DB_CONNECTION_STRING="${DB_CONNECTION_STRING/Host=opencortex-postgres;/Host=${{ env.DEVELOP_DB_HOST }};}"

          kubectl create secret generic opencortex-db-credentials \
            --namespace=opencortex-develop \
            --from-literal=connection-string="${DB_CONNECTION_STRING}" \
            --dry-run=client -o yaml | kubectl apply -f -

          kubectl create secret generic opencortex-security \
            --namespace=opencortex-develop \
            --from-literal=encryption-key="${{ secrets.OPENCORTEX_ENCRYPTION_KEY }}" \
            --dry-run=client -o yaml | kubectl apply -f -

          kubectl create secret generic opencortex-firebase \
            --namespace=opencortex-develop \
            --from-literal=project-id="${{ secrets.FIREBASE_PROJECT_ID }}" \
            --from-literal=api-key="${{ secrets.FIREBASE_API_KEY }}" \
            --from-literal=admin-user-ids="${{ secrets.FIREBASE_ADMIN_USER_IDS }}" \
            --from-literal=admin-email-patterns="${{ secrets.FIREBASE_ADMIN_EMAIL_PATTERNS }}" \
            --dry-run=client -o yaml | kubectl apply -f -

          kubectl create secret generic opencortex-stripe \
            --namespace=opencortex-develop \
            --from-literal=secret-key="${{ secrets.STRIPE_SECRET_KEY }}" \
            --from-literal=webhook-secret="${{ secrets.STRIPE_WEBHOOK_SECRET }}" \
            --from-literal=app-base-url="https://${{ env.DOMAIN }}" \
            --dry-run=client -o yaml | kubectl apply -f -

          kubectl create secret generic opencortex-embeddings \
            --namespace=opencortex-develop \
            --from-literal=api-key="${{ secrets.EMBEDDINGS_API_KEY }}" \
            --from-literal=endpoint="${{ vars.EMBEDDINGS_ENDPOINT }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Generate IngressRoute from template
        run: |
          export DOMAIN="${{ env.DOMAIN }}"
          sed "s|\${DOMAIN}|${DOMAIN}|g" infra/k8s/overlays/develop/ingressroute.yaml | kubectl apply -f -

      - name: Deploy agent-workspaces infrastructure
        run: |
          kubectl apply -k k8s/agent-workspaces/

      - name: Copy image pull secret to agent-workspaces
        run: |
          kubectl get secret ghcr-pull-secret -n opencortex-develop \
            -o jsonpath='{.data.\.dockerconfigjson}' | base64 -d > /tmp/ghcr-dockerconfig.json

          kubectl create secret generic ghcr-pull-secret \
            --namespace=agent-workspaces \
            --type=kubernetes.io/dockerconfigjson \
            --from-file=.dockerconfigjson=/tmp/ghcr-dockerconfig.json \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Delete deployments for selector migration
        run: |
          # One-time migration: selectors changed from commonLabels to labels
          # Kubernetes doesn't allow selector changes, so we must delete and recreate
          # This step can be removed after successful deployment
          kubectl delete deployment opencortex-api opencortex-portal opencortex-mcp opencortex-workers \
            -n opencortex-develop --ignore-not-found --wait=true
          # Give k8s a moment to finalize deletion
          sleep 5

      - name: Deploy to Kubernetes
        run: |
          kubectl apply -k infra/k8s/overlays/develop --server-side --force-conflicts
          kubectl set image deployment/opencortex-api api=${{ env.IMAGE_PREFIX }}/api:${{ env.IMAGE_TAG }} -n opencortex-develop
          kubectl set image deployment/opencortex-portal portal=${{ env.IMAGE_PREFIX }}/portal:${{ env.IMAGE_TAG }} -n opencortex-develop
          kubectl set image deployment/opencortex-mcp mcp=${{ env.IMAGE_PREFIX }}/mcp:${{ env.IMAGE_TAG }} -n opencortex-develop
          kubectl set image deployment/opencortex-workers workers=${{ env.IMAGE_PREFIX }}/workers:${{ env.IMAGE_TAG }} -n opencortex-develop

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/opencortex-api -n opencortex-develop --timeout=300s
          kubectl rollout status deployment/opencortex-portal -n opencortex-develop --timeout=300s
          kubectl rollout status deployment/opencortex-mcp -n opencortex-develop --timeout=300s
          kubectl rollout status deployment/opencortex-workers -n opencortex-develop --timeout=300s

      - name: Verify deployment
        run: |
          echo "Deployed images:"
          kubectl get pods -n opencortex-develop -o jsonpath='{range .items[*]}{.metadata.name}{"\t"}{.spec.containers[*].image}{"\n"}{end}'
          echo ""
          echo "Services:"
          kubectl get services -n opencortex-develop
          echo ""
          echo "IngressRoutes:"
          kubectl get ingressroute -n opencortex-develop
          echo ""
          echo "Application URL: https://${{ env.DOMAIN }}"
