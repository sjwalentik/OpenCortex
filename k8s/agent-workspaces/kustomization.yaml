apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Note: We don't use a global namespace here because resources span multiple namespaces:
# - ServiceAccount is in opencortex-develop (where API runs)
# - Role/RoleBinding are in agent-workspaces (where agent pods run)
# - ClusterRole/ClusterRoleBinding are cluster-scoped

resources:
  - namespace.yaml
  - rbac.yaml
  - default-network-policy.yaml
  - resource-quota.yaml

labels:
  - pairs:
      app.kubernetes.io/name: opencortex
      app.kubernetes.io/component: agent-workspaces
      app.kubernetes.io/managed-by: kustomize
    includeSelectors: false
