# Secret templates for OpenCortex
# These values should be injected at deployment time from your secrets manager
# DO NOT commit actual secret values to source control

---
apiVersion: v1
kind: Secret
metadata:
  name: opencortex-db-credentials
  namespace: opencortex
  labels:
    app.kubernetes.io/name: opencortex
    app.kubernetes.io/part-of: opencortex
type: Opaque
stringData:
  # Format: Host=<host>;Port=5432;Database=opencortex;Username=<user>;Password=<pass>
  connection-string: "${DB_CONNECTION_STRING}"

---
apiVersion: v1
kind: Secret
metadata:
  name: opencortex-security
  namespace: opencortex
  labels:
    app.kubernetes.io/name: opencortex
    app.kubernetes.io/part-of: opencortex
type: Opaque
stringData:
  encryption-key: "${OPENCORTEX_ENCRYPTION_KEY}"

---
apiVersion: v1
kind: Secret
metadata:
  name: opencortex-firebase
  namespace: opencortex
  labels:
    app.kubernetes.io/name: opencortex
    app.kubernetes.io/part-of: opencortex
type: Opaque
stringData:
  project-id: "${FIREBASE_PROJECT_ID}"
  api-key: "${FIREBASE_API_KEY}"
  # Comma-separated list of admin Firebase user IDs
  admin-user-ids: "${FIREBASE_ADMIN_USER_IDS}"
  # Comma-separated list of admin email patterns (e.g., *@company.com)
  admin-email-patterns: "${FIREBASE_ADMIN_EMAIL_PATTERNS}"

---
apiVersion: v1
kind: Secret
metadata:
  name: opencortex-stripe
  namespace: opencortex
  labels:
    app.kubernetes.io/name: opencortex
    app.kubernetes.io/part-of: opencortex
type: Opaque
stringData:
  secret-key: "${STRIPE_SECRET_KEY}"
  webhook-secret: "${STRIPE_WEBHOOK_SECRET}"
  app-base-url: "${STRIPE_APP_BASE_URL}"

---
apiVersion: v1
kind: Secret
metadata:
  name: opencortex-embeddings
  namespace: opencortex
  labels:
    app.kubernetes.io/name: opencortex
    app.kubernetes.io/part-of: opencortex
type: Opaque
stringData:
  api-key: "${EMBEDDINGS_API_KEY}"
  endpoint: "${EMBEDDINGS_ENDPOINT}"
