apiVersion: apps/v1
kind: Deployment
metadata:
  name: opencortex-workers
  namespace: opencortex
  labels:
    app.kubernetes.io/name: opencortex-workers
    app.kubernetes.io/component: workers
    app.kubernetes.io/part-of: opencortex
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: opencortex-workers
  template:
    metadata:
      labels:
        app.kubernetes.io/name: opencortex-workers
        app.kubernetes.io/component: workers
        app.kubernetes.io/part-of: opencortex
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: workers
          image: opencortex/workers:latest
          imagePullPolicy: Always
          env:
            # Database
            - name: OpenCortex__Database__ConnectionString
              valueFrom:
                secretKeyRef:
                  name: opencortex-db-credentials
                  key: connection-string
            # Embeddings
            - name: OpenCortex__Embeddings__Provider
              valueFrom:
                configMapKeyRef:
                  name: opencortex-config
                  key: EMBEDDINGS_PROVIDER
            - name: OpenCortex__Embeddings__Model
              valueFrom:
                configMapKeyRef:
                  name: opencortex-config
                  key: EMBEDDINGS_MODEL
            - name: OpenCortex__Embeddings__Dimensions
              valueFrom:
                configMapKeyRef:
                  name: opencortex-config
                  key: EMBEDDINGS_DIMENSIONS
            - name: OpenCortex__Embeddings__ApiKey
              valueFrom:
                secretKeyRef:
                  name: opencortex-embeddings
                  key: api-key
            - name: OpenCortex__Embeddings__Endpoint
              valueFrom:
                secretKeyRef:
                  name: opencortex-embeddings
                  key: endpoint
                  optional: true
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
