apiVersion: apps/v1
kind: Deployment
metadata:
  name: opencortex-api
  labels:
    app.kubernetes.io/name: opencortex-api
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: opencortex
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: opencortex-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: opencortex-api
        app.kubernetes.io/component: api
        app.kubernetes.io/part-of: opencortex
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: api
          image: opencortex/api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              protocol: TCP
          env:
            # Database
            - name: OpenCortex__Database__ConnectionString
              valueFrom:
                secretKeyRef:
                  name: opencortex-db-credentials
                  key: connection-string
            # Credential encryption
            - name: OpenCortex__Security__EncryptionKey
              valueFrom:
                secretKeyRef:
                  name: opencortex-security
                  key: encryption-key
            # Embeddings
            - name: OpenCortex__Embeddings__Provider
              valueFrom:
                configMapKeyRef:
                  name: opencortex-config
                  key: EMBEDDINGS_PROVIDER
            - name: OpenCortex__Embeddings__Model
              valueFrom:
                configMapKeyRef:
                  name: opencortex-config
                  key: EMBEDDINGS_MODEL
            - name: OpenCortex__Embeddings__Dimensions
              valueFrom:
                configMapKeyRef:
                  name: opencortex-config
                  key: EMBEDDINGS_DIMENSIONS
            - name: OpenCortex__Embeddings__ApiKey
              valueFrom:
                secretKeyRef:
                  name: opencortex-embeddings
                  key: api-key
            - name: OpenCortex__Embeddings__Endpoint
              valueFrom:
                secretKeyRef:
                  name: opencortex-embeddings
                  key: endpoint
                  optional: true
            # Firebase Auth
            - name: OpenCortex__HostedAuth__Enabled
              valueFrom:
                configMapKeyRef:
                  name: opencortex-config
                  key: HOSTED_AUTH_ENABLED
            - name: OpenCortex__HostedAuth__FirebaseProjectId
              valueFrom:
                secretKeyRef:
                  name: opencortex-firebase
                  key: project-id
            - name: OpenCortex__HostedAuth__AdminUserIds__0
              valueFrom:
                secretKeyRef:
                  name: opencortex-firebase
                  key: admin-user-ids
                  optional: true
            - name: OpenCortex__HostedAuth__AdminEmailPatterns__0
              valueFrom:
                secretKeyRef:
                  name: opencortex-firebase
                  key: admin-email-patterns
                  optional: true
            # Stripe
            - name: OpenCortex__Billing__Stripe__Enabled
              valueFrom:
                configMapKeyRef:
                  name: opencortex-config
                  key: STRIPE_ENABLED
            - name: OpenCortex__Billing__Stripe__SecretKey
              valueFrom:
                secretKeyRef:
                  name: opencortex-stripe
                  key: secret-key
            - name: OpenCortex__Billing__Stripe__WebhookSecret
              valueFrom:
                secretKeyRef:
                  name: opencortex-stripe
                  key: webhook-secret
            - name: OpenCortex__Billing__Stripe__AppBaseUrl
              valueFrom:
                secretKeyRef:
                  name: opencortex-stripe
                  key: app-base-url
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL

---
apiVersion: v1
kind: Service
metadata:
  name: opencortex-api
  labels:
    app.kubernetes.io/name: opencortex-api
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: opencortex
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: opencortex-api
