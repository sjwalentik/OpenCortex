apiVersion: apps/v1
kind: Deployment
metadata:
  name: opencortex-portal
  namespace: opencortex
  labels:
    app.kubernetes.io/name: opencortex-portal
    app.kubernetes.io/component: portal
    app.kubernetes.io/part-of: opencortex
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: opencortex-portal
  template:
    metadata:
      labels:
        app.kubernetes.io/name: opencortex-portal
        app.kubernetes.io/component: portal
        app.kubernetes.io/part-of: opencortex
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: portal
          image: opencortex/portal:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              protocol: TCP
          env:
            - name: Portal__ApiBaseUrl
              valueFrom:
                configMapKeyRef:
                  name: opencortex-config
                  key: API_INTERNAL_URL
            - name: Portal__McpBaseUrl
              valueFrom:
                configMapKeyRef:
                  name: opencortex-config
                  key: MCP_INTERNAL_URL
            - name: Portal__Auth__FirebaseProjectId
              valueFrom:
                secretKeyRef:
                  name: opencortex-firebase
                  key: project-id
            - name: Portal__Auth__FirebaseApiKey
              valueFrom:
                secretKeyRef:
                  name: opencortex-firebase
                  key: api-key
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL

---
apiVersion: v1
kind: Service
metadata:
  name: opencortex-portal
  namespace: opencortex
  labels:
    app.kubernetes.io/name: opencortex-portal
    app.kubernetes.io/component: portal
    app.kubernetes.io/part-of: opencortex
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: opencortex-portal
