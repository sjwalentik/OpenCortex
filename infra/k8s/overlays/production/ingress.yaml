apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: opencortex-ingress
  namespace: opencortex
  labels:
    app.kubernetes.io/name: opencortex-ingress
    app.kubernetes.io/instance: production
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    # Security headers
    nginx.ingress.kubernetes.io/configuration-snippet: |
      add_header X-Content-Type-Options "nosniff" always;
      add_header X-Frame-Options "DENY" always;
      add_header X-XSS-Protection "1; mode=block" always;
      add_header Referrer-Policy "strict-origin-when-cross-origin" always;
      add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.opencortex.io
        - portal.opencortex.io
        - mcp.opencortex.io
      secretName: opencortex-tls
  rules:
    - host: api.opencortex.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: opencortex-api
                port:
                  number: 8080
    - host: portal.opencortex.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: opencortex-portal
                port:
                  number: 8080
    - host: mcp.opencortex.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: opencortex-mcp
                port:
                  number: 8080
