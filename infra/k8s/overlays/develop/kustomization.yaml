apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: opencortex-develop

resources:
  - ../../base
  - namespace.yaml
  # Note: ingressroute.yaml is applied separately with domain substitution in the deploy workflow

commonLabels:
  app.kubernetes.io/instance: develop
  environment: develop

images:
  - name: opencortex/api
    newName: ghcr.io/sjwalentik/opencortex/api
    newTag: develop
  - name: opencortex/portal
    newName: ghcr.io/sjwalentik/opencortex/portal
    newTag: develop
  - name: opencortex/mcp
    newName: ghcr.io/sjwalentik/opencortex/mcp
    newTag: develop
  - name: opencortex/workers
    newName: ghcr.io/sjwalentik/opencortex/workers
    newTag: develop

patches:
  - path: patches/replicas.yaml
  - path: patches/resources.yaml
  - path: patches/image-pull-secret.yaml

configMapGenerator:
  - name: opencortex-config
    behavior: merge
    literals:
      - HOSTED_AUTH_ENABLED=true
      - STRIPE_ENABLED=false
      - API_INTERNAL_URL=http://opencortex-api:8080
      - MCP_INTERNAL_URL=http://opencortex-mcp:8080
      - EMBEDDINGS_PROVIDER=ollama
      - EMBEDDINGS_MODEL=nomic-embed-text
      - EMBEDDINGS_DIMENSIONS=768
