# Traefik IngressRoute for OpenCortex Develop
# Domain is templated by the deploy workflow before apply
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: opencortex
  namespace: opencortex-develop
  labels:
    app.kubernetes.io/name: opencortex
    app.kubernetes.io/instance: develop
spec:
  entryPoints:
    - websecure
  routes:
    # Portal - main site
    - match: Host(`${DOMAIN}`)
      kind: Rule
      services:
        - name: opencortex-portal
          port: 8080
    # API - under /api path
    - match: Host(`${DOMAIN}`) && PathPrefix(`/api`)
      kind: Rule
      middlewares:
        - name: strip-api-prefix
      services:
        - name: opencortex-api
          port: 8080
    # MCP Server - under /mcp path
    - match: Host(`${DOMAIN}`) && PathPrefix(`/mcp`)
      kind: Rule
      middlewares:
        - name: strip-mcp-prefix
      services:
        - name: opencortex-mcp
          port: 8080
  tls:
    certResolver: letsencrypt

---
# HTTP to HTTPS redirect
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: opencortex-http
  namespace: opencortex-develop
  labels:
    app.kubernetes.io/name: opencortex
    app.kubernetes.io/instance: develop
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`${DOMAIN}`)
      kind: Rule
      middlewares:
        - name: redirect-https
          namespace: traefik
      services:
        - name: opencortex-portal
          port: 8080

---
# Middleware to strip /api prefix
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: strip-api-prefix
  namespace: opencortex-develop
spec:
  stripPrefix:
    prefixes:
      - /api

---
# Middleware to strip /mcp prefix
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: strip-mcp-prefix
  namespace: opencortex-develop
spec:
  stripPrefix:
    prefixes:
      - /mcp

---
# Security headers middleware
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: security-headers
  namespace: opencortex-develop
spec:
  headers:
    frameDeny: true
    contentTypeNosniff: true
    browserXssFilter: true
    referrerPolicy: "strict-origin-when-cross-origin"
    customResponseHeaders:
      X-Powered-By: ""
