# Reduce resource requests/limits for develop environment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: opencortex-api
  namespace: opencortex
spec:
  template:
    spec:
      containers:
        - name: api
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "250m"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: opencortex-portal
  namespace: opencortex
spec:
  template:
    spec:
      containers:
        - name: portal
          resources:
            requests:
              memory: "64Mi"
              cpu: "25m"
            limits:
              memory: "128Mi"
              cpu: "125m"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: opencortex-mcp
  namespace: opencortex
spec:
  template:
    spec:
      containers:
        - name: mcp
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "250m"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: opencortex-workers
  namespace: opencortex
spec:
  template:
    spec:
      containers:
        - name: workers
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
              cpu: "500m"
