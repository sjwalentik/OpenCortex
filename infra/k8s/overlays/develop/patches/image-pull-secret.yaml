# Add image pull secret for ghcr.io
apiVersion: apps/v1
kind: Deployment
metadata:
  name: opencortex-api
  namespace: opencortex
spec:
  template:
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: opencortex-portal
  namespace: opencortex
spec:
  template:
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: opencortex-mcp
  namespace: opencortex
spec:
  template:
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: opencortex-workers
  namespace: opencortex
spec:
  template:
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
