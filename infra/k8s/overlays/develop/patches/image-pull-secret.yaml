# Add image pull secret for ghcr.io
apiVersion: apps/v1
kind: Deployment
metadata:
  name: opencortex-api
spec:
  template:
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: opencortex-portal
spec:
  template:
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: opencortex-mcp
spec:
  template:
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: opencortex-workers
spec:
  template:
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
